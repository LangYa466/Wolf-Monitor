name: ci

# Build + lint both halves of the repo. Each job is gated by path filters so
# only the changed half runs on a given PR.
on:
  pull_request:
    branches: [main]
    paths:
      - "node/**"
      - "master/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "node/**"
      - "master/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: node · go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: node/go.sum
      - name: vet + build
        working-directory: node
        run: |
          go vet ./...
          go build ./...

  master:
    name: master · next build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: master/pnpm-lock.yaml
      - name: install
        working-directory: master
        run: pnpm install --frozen-lockfile
      - name: build
        working-directory: master
        run: pnpm build
