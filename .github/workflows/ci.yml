name: ci

# Only guards the Go agent — `master/` is already built by Vercel preview on
# every PR / push, so duplicating it here just burns Actions minutes.
on:
  pull_request:
    branches: [main]
    paths:
      - "node/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "node/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

# Cancel in-flight runs on the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: node · go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: node/go.sum
      - name: vet + build
        working-directory: node
        run: |
          go vet ./...
          go build ./...
